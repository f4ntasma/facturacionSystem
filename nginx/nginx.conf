server {
    listen 80;
    
    resolver 127.0.0.11 valid=30s;
    
    location / {
        set $upstream_frontend http://frontend:4200;
        proxy_pass $upstream_frontend; 
    }
    
    location /api/ {
        set $upstream_backend http://backend:8081/;
        proxy_pass $upstream_backend; 
    }
}