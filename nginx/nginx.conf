server {
    listen 80;

    resolver 127.0.0.11 valid=30s;

    # Reenvía headers esenciales al upstream (sin esto el CorsFilter de Spring
    # no ve el header Origin y no agrega Access-Control-Allow-Origin)
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Origin            $http_origin;

    location /api/ {
        set $upstream_backend http://backend:8080;
        proxy_pass $upstream_backend;
    }

    location / {
        set $upstream_frontend http://frontend:4200;
        proxy_pass $upstream_frontend;
    }
}