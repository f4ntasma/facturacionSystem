version: '3.8'

services:
  mariadb:
    image: mariadb:10.11
    container_name: facturacion-mariadb
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: facturacion123
      MYSQL_DATABASE: facturacion
      MYSQL_USER: facturacion
      MYSQL_PASSWORD: facturacion123
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - facturacion-network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - facturacion-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/test"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build: ./frontend
    ports:
      - "4200:4200"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - facturacion-network

volumes:
  mariadb_data:

networks:
  facturacion-network:
    driver: bridge