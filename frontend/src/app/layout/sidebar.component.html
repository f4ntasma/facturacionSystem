<div class="sidebar" style="width: var(--sidebar-width); height: 100vh; background: linear-gradient(180deg, var(--primary-blue) 0%, var(--accent-purple) 100%); padding: 24px; display: flex; flex-direction: column; box-shadow: var(--shadow-xl);">
  
  <!-- Logo/Brand -->
  <div style="margin-bottom: 32px; text-align: center;">
    <h1 style="color: var(--white); font-size: 24px; font-weight: 700; margin: 0; text-transform: uppercase; letter-spacing: 2px;">
      Factullama
    </h1>
  </div>

  <!-- Navigation -->
  <ul style="list-style: none; padding: 0; margin: 0; flex: 1;">
    
    <li style="margin-bottom: 6px;">
      <div (click)="irAVentas()" 
           style="padding: 12px 16px; border-radius: var(--radius); cursor: pointer; color: var(--white); font-weight: 500; display: flex; align-items: center; gap: 12px; transition: all 0.3s ease; background: rgba(255, 255, 255, 0.1);"
           onmouseover="this.style.background='rgba(255, 255, 255, 0.2)'; this.style.transform='translateX(4px)'"
           onmouseout="this.style.background='rgba(255, 255, 255, 0.1)'; this.style.transform='translateX(0)'">
        <span style="font-size: 16px;"><img src="svg/cart-alt-2.svg" alt="Clientes" style="width: 16px; height: 16px;"></span>
        <span style="font-size: 14px; font-weight: 500;">Ventas</span>
      </div>
    </li>

    <li style="margin-bottom: 6px;">
      <div (click)="irAProductos()" 
           style="padding: 12px 16px; border-radius: var(--radius); cursor: pointer; color: var(--white); font-weight: 500; display: flex; align-items: center; gap: 12px; transition: all 0.3s ease; background: rgba(255, 255, 255, 0.1);"
           onmouseover="this.style.background='rgba(255, 255, 255, 0.2)'; this.style.transform='translateX(4px)'"
           onmouseout="this.style.background='rgba(255, 255, 255, 0.1)'; this.style.transform='translateX(0)'">
        <span style="font-size: 16px;"><img src="svg/layers-down-right.svg" alt="Clientes" style="width: 16px; height: 16px;"></span>
        <span style="font-size: 14px; font-weight: 500;">Productos</span>
      </div>
    </li>

    <li style="margin-bottom: 6px;">
      <div (click)="irAClientes()" 
           style="padding: 12px 16px; border-radius: var(--radius); cursor: pointer; color: var(--white); font-weight: 500; display: flex; align-items: center; gap: 12px; transition: all 0.3s ease; background: rgba(255, 255, 255, 0.1);"
           onmouseover="this.style.background='rgba(255, 255, 255, 0.2)'; this.style.transform='translateX(4px)'"
           onmouseout="this.style.background='rgba(255, 255, 255, 0.1)'; this.style.transform='translateX(0)'">
        <span style="font-size: 16px;"><img src="svg/community.svg" alt="Clientes" style="width: 16px; height: 16px;"></span>
        <span style="font-size: 14px; font-weight: 500;">Clientes</span>

        <span style="font-size: 16px;"><img src="svg/widget.svg" alt="Clientes" style="width: 16px; height: 16px;"></span>

    </li>

    <li style="margin-bottom: 6px;">
      <div (click)="irAEmpresas()" 
           style="padding: 12px 16px; border-radius: var(--radius); cursor: pointer; color: var(--white); font-weight: 500; display: flex; align-items: center; gap: 12px; transition: all 0.3s ease; background: rgba(255, 255, 255, 0.1);"
           onmouseover="this.style.background='rgba(255, 255, 255, 0.2)'; this.style.transform='translateX(4px)'"
           onmouseout="this.style.background='rgba(255, 255, 255, 0.1)'; this.style.transform='translateX(0)'">

    <li style="margin-bottom: 6px;">
      <div (click)="irAOpciones()" 
           style="padding: 12px 16px; border-radius: var(--radius); cursor: pointer; color: var(--white); font-weight: 500; display: flex; align-items: center; gap: 12px; transition: all 0.3s ease; background: rgba(255, 255, 255, 0.1);"
           onmouseover="this.style.background='rgba(255, 255, 255, 0.2)'; this.style.transform='translateX(4px)'"

  <!-- Footer -->
  <div style="margin-top: auto; padding-top: 24px; border-top: 1px solid rgba(255, 255, 255, 0.2); text-align: center;">
    <p style="color: rgba(255, 255, 255, 0.8); font-size: 10px; margin: 0;">© 2026 Factullama</p>
  </div>

</div>
