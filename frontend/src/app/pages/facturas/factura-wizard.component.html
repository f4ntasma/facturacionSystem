<div class="fade-in">
  
  <!-- Page Header -->
  <div class="d-flex justify-between items-center mb-4 w-100">
    <div>
      <h1 class="font-bold" style="font-size: 28px; color: var(--primary-blue);">Nueva Factura Electrónica</h1>
      <p class="text-muted" style="font-size: 14px;">Complete cada sección para emitir la factura</p>
    </div>
    <div class="text-right">
      <button class="btn btn-outline" (click)="volver()">
        Volver
      </button>
    </div>
  </div>

  <!-- Cards de Secciones -->
  <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 30px;">
    <div *ngFor="let section of sections" 
         class="card clickable-card"
         (click)="navigateToSection(section)"
         style="cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;">
      <div class="card-body" style="text-align: center; padding: 30px;">
        <div style="font-size: 48px; margin-bottom: 15px;">{{ section.icon }}</div>
        <h3 style="font-size: 18px; font-weight: 600; color: var(--primary-blue); margin-bottom: 10px;">
          {{ section.title }}
        </h3>
        <p style="font-size: 14px; color: var(--neutral-gray); margin-bottom: 15px;">
          {{ section.description }}
        </p>
        <div *ngIf="section.completed" style="color: var(--success); font-size: 14px;">
          ✓ Completado
        </div>
        <div *ngIf="!section.completed" style="color: var(--warning); font-size: 14px;">
          Pendiente
        </div>
      </div>
    </div>
  </div>

  <!-- Botón de Enviar -->
  <div class="d-flex justify-end gap-2" style="margin-top: 30px;">
    <button class="btn btn-secondary" (click)="volver()">
      Cancelar
    </button>
    <button class="btn btn-success" 
            [disabled]="!allSectionsCompleted()">
      Enviar a SUNAT
    </button>
  </div>

</div>

<style>
.clickable-card:hover {
  transform: translateY(-5px);
  box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
}

.clickable-card:active {
  transform: translateY(-2px);
}
</style>
