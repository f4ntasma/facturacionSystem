<div class="fade-in">
  
  <!-- Page Header -->
  <div class="d-flex justify-between items-center mb-4 w-100">
    <div>
      <h1 class="font-bold" style="font-size: 28px; color: var(--primary-blue);">Totales e Impuestos</h1>
      <p class="text-muted" style="font-size: 14px;">Resumen de montos calculados automáticamente</p>
    </div>
    <div class="text-right">
      <button class="btn btn-outline" (click)="volver()">
        Volver
      </button>
    </div>
  </div>

  <!-- Resumen de Totales -->
  <div class="card mb-4">
    <div class="card-header">
      <h3>Resumen de Montos</h3>
    </div>
    <div class="card-body">
      <form [formGroup]="totalesForm">
        <div class="grid grid-3">
          <div class="form-group">
            <label class="form-label">Op. Gravadas</label>
            <input type="number" 
                   class="form-control" 
                   formControlName="mtoOperGravadas" 
                   readonly>
          </div>
          <div class="form-group">
            <label class="form-label">Op. Inafectas</label>
            <input type="number" 
                   class="form-control" 
                   formControlName="mtoOperInafectas" 
                   readonly>
          </div>
          <div class="form-group">
            <label class="form-label">Op. Exoneradas</label>
            <input type="number" 
                   class="form-control" 
                   formControlName="mtoOperExoneradas" 
                   readonly>
          </div>
        </div>
        <div class="grid grid-3">
          <div class="form-group">
            <label class="form-label">Op. Exportación</label>
            <input type="number" 
                   class="form-control" 
                   formControlName="mtoOperExportacion" 
                   readonly>
          </div>
          <div class="form-group">
            <label class="form-label">IGV (18%)</label>
            <input type="number" 
                   class="form-control" 
                   formControlName="mtoIGV" 
                   readonly>
          </div>
          <div class="form-group">
            <label class="form-label">ISC</label>
            <input type="number" 
                   class="form-control" 
                   formControlName="mtoISC" 
                   readonly>
          </div>
        </div>
        <div class="grid grid-3">
          <div class="form-group">
            <label class="form-label">Otros Tributos</label>
            <input type="number" 
                   class="form-control" 
                   formControlName="mtoOtrosTributos" 
                   readonly>
          </div>
          <div class="form-group">
            <label class="form-label">ICBPER</label>
            <input type="number" 
                   class="form-control" 
                   formControlName="icbper" 
                   readonly>
          </div>
          <div class="form-group">
            <label class="form-label">Total Impuestos</label>
            <input type="number" 
                   class="form-control" 
                   formControlName="totalImpuestos" 
                   readonly>
          </div>
        </div>
      </form>
    </div>
  </div>

  <!-- Resumen Final -->
  <div class="card mb-4">
    <div class="card-body">
      <div class="d-flex justify-between items-center" style="background: var(--neutral-light); padding: 20px; border-radius: var(--radius);">
        <div>
          <div class="text-muted" style="font-size: 14px;">Valor Venta:</div>
          <div class="font-semibold" style="font-size: 18px;">S/ {{ valorVenta | number:'1.2-2' }}</div>
        </div>
        <div>
          <div class="text-muted" style="font-size: 14px;">Subtotal:</div>
          <div class="font-semibold" style="font-size: 18px;">S/ {{ subTotal | number:'1.2-2' }}</div>
        </div>
        <div>
          <div class="text-muted" style="font-size: 14px;">Total Impuestos:</div>
          <div class="font-semibold" style="font-size: 18px;">S/ {{ mtoIGV | number:'1.2-2' }}</div>
        </div>
        <div>
          <div class="text-muted" style="font-size: 14px;">Importe Total:</div>
          <div class="font-bold" style="font-size: 24px; color: var(--success);">S/ {{ mtoImpVenta | number:'1.2-2' }}</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Botones -->
  <div class="d-flex justify-between gap-2">
    <button class="btn btn-secondary" (click)="volver()">
      ← Anterior
    </button>
    <button class="btn btn-success" 
            (click)="guardarYContinuar()">
      Guardar y Continuar →
    </button>
  </div>

</div>
