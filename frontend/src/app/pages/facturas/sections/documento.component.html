<div class="fade-in">
  
  <!-- Page Header -->
  <div class="d-flex justify-between items-center mb-4 w-100">
    <div>
      <h1 class="font-bold" style="font-size: 28px; color: var(--primary-blue);">Información del Documento</h1>
      <p class="text-muted" style="font-size: 14px;">Complete los datos del comprobante electrónico</p>
    </div>
    <div class="text-right">
      <button class="btn btn-outline" (click)="volver()">
        Volver
      </button>
    </div>
  </div>

  <!-- Formulario -->
  <div class="card mb-4">
    <div class="card-header">
      <h3>Datos del Documento</h3>
    </div>
    <div class="card-body">
      <form [formGroup]="documentoForm">
        <div class="grid grid-3">
          <div class="form-group">
            <label class="form-label">Tipo de Documento *</label>
            <select class="form-control" formControlName="tipoDoc">
              <option value="01">01 - Factura</option>
              <option value="03">03 - Boleta de Venta</option>
            </select>
            <small class="text-muted">Catálogo No. 01</small>
          </div>
          <div class="form-group">
            <label class="form-label">Serie *</label>
            <input type="text" 
                   class="form-control" 
                   formControlName="serie" 
                   placeholder="Ej: F001">
          </div>
          <div class="form-group">
            <label class="form-label">Correlativo *</label>
            <input type="text" 
                   class="form-control" 
                   formControlName="correlativo" 
                   placeholder="Ej: 000001">
          </div>
        </div>
        <div class="grid grid-3">
          <div class="form-group">
            <label class="form-label">Fecha de Emisión *</label>
            <input type="date" 
                   class="form-control" 
                   formControlName="fechaEmision">
          </div>
          <div class="form-group">
            <label class="form-label">Fecha de Vencimiento</label>
            <input type="date" 
                   class="form-control" 
                   formControlName="fecVencimiento">
          </div>
          <div class="form-group">
            <label class="form-label">Moneda *</label>
            <select class="form-control" formControlName="tipoMoneda">
              <option value="PEN">PEN - Soles</option>
              <option value="USD">USD - Dólares Americanos</option>
            </select>
          </div>
        </div>
        <div class="grid grid-2">
          <div class="form-group">
            <label class="form-label">Tipo de Operación *</label>
            <select class="form-control" formControlName="tipoOperacion">
              <option value="0101">0101 - Venta Interna</option>
              <option value="0200">0200 - Exportación</option>
              <option value="0401">0401 - Convenio</option>
            </select>
            <small class="text-muted">Catálogo No. 51</small>
          </div>
          <div class="form-group">
            <label class="form-label">Versión UBL</label>
            <input type="text" 
                   class="form-control" 
                   formControlName="ublVersion" 
                   placeholder="2.1"
                   readonly>
          </div>
        </div>
      </form>
    </div>
  </div>

  <!-- Botones -->
  <div class="d-flex justify-between gap-2">
    <button class="btn btn-secondary" (click)="volver()">
      Cancelar
    </button>
    <button class="btn btn-success" 
            [disabled]="documentoForm.invalid"
            (click)="guardarYContinuar()">
      Guardar y Continuar →
    </button>
  </div>

</div>
