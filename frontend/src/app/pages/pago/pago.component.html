<div style="min-height: 100vh; background: var(--neutral-light); display: flex; align-items: center; justify-content: center; padding: 2rem;">

  <div style="background: white; border-radius: 1rem; box-shadow: var(--shadow-md); padding: 2.5rem; width: 100%; max-width: 480px;">

    <!-- Header -->
    <div style="text-align: center; margin-bottom: 2rem;">
      <h1 style="font-size: 28px; font-weight: 700; color: var(--primary-blue); margin-bottom: 0.5rem;">
        Factullama
      </h1>
      <p style="font-size: 14px; color: var(--neutral-gray);">Completa tu suscripcion</p>
    </div>

    <!-- Resumen del plan -->
    <div style="background: var(--info-light); border: 1px solid var(--info); border-radius: 0.75rem; padding: 1.5rem; margin-bottom: 2rem;">
      <div style="font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--info); margin-bottom: 0.5rem;">
        Plan seleccionado
      </div>
      <div style="display: flex; justify-content: space-between; align-items: center;">
        <div style="font-size: 22px; font-weight: 700; color: var(--primary-blue);">
          {{ planNombre }}
        </div>
        <div style="font-size: 28px; font-weight: 700; color: var(--success);">
          S/ {{ planPrecio }}
          <span style="font-size: 13px; font-weight: 400; color: var(--neutral-gray);">/mes</span>
        </div>
      </div>
    </div>

    <!-- Metodo de pago -->
    <div style="margin-bottom: 2rem;">
      <div style="font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--neutral-gray); margin-bottom: 0.75rem;">
        Metodo de pago
      </div>
      <div style="display: flex; align-items: center; gap: 0.75rem; padding: 1rem; border: 2px solid var(--primary-blue); border-radius: 0.5rem; background: rgba(30,58,138,0.04);">
        <div style="width: 40px; height: 25px; background: linear-gradient(135deg, #009ee3, #0070c0); border-radius: 4px; display: flex; align-items: center; justify-content: center;">
          <span style="color: white; font-size: 9px; font-weight: 700;">MP</span>
        </div>
        <span style="font-size: 14px; font-weight: 500; color: var(--neutral-black);">MercadoPago</span>
        <span style="margin-left: auto; font-size: 12px; color: var(--neutral-gray);">Tarjeta, Yape, Plin y mas</span>
      </div>
    </div>

    <!-- Error -->
    <div *ngIf="error"
         style="background: var(--error-light); border: 1px solid var(--error); border-radius: 0.5rem; padding: 0.875rem 1rem; margin-bottom: 1.5rem; font-size: 14px; color: var(--error);">
      {{ error }}
    </div>

    <!-- Boton pagar -->
    <button
      (click)="pagar()"
      [disabled]="loading"
      style="width: 100%; padding: 1rem; background: linear-gradient(135deg, var(--primary-blue), var(--primary-blue-light));
             color: white; border: none; border-radius: 0.75rem; font-size: 16px; font-weight: 700;
             cursor: pointer; letter-spacing: 0.5px; transition: opacity 0.2s;"
      [style.opacity]="loading ? '0.6' : '1'">
      {{ loading ? 'Redirigiendo a MercadoPago...' : 'Pagar S/ ' + planPrecio }}
    </button>

    <p style="text-align: center; font-size: 12px; color: var(--neutral-gray); margin-top: 1.25rem;">
      Seras redirigido a MercadoPago para completar el pago de forma segura.
    </p>

  </div>

</div>
