<div class="fade-in">
  
  <!-- Page Header -->
  <div class="d-flex justify-between items-center mb-4 w-100">
    <div>
      <h1 class="font-bold" style="font-size: 28px; color: var(--primary-blue);">{{ isEditing ? 'Editar Cliente' : 'Nuevo Cliente' }}</h1>
      <p class="text-muted" style="font-size: 14px;">{{ isEditing ? 'Actualiza la información del cliente' : 'Registra un nuevo cliente en el sistema' }}</p>
    </div>
    <div class="text-right">
      <button class="btn btn-outline" (click)="volver()">
        Volver
      </button>
    </div>
  </div>

  <!-- Formulario -->
  <div class="card">
    <div class="card-header">
      <h3>Información del Cliente</h3>
    </div>
    <div class="card-body">
      <form [formGroup]="clienteForm" (ngSubmit)="onSubmit()">
        <div class="grid grid-2">
          <div class="form-group">
            <label class="form-label">Nombre *</label>
            <input type="text" 
                   class="form-control" 
                   formControlName="nombre" 
                   placeholder="Nombre del cliente">
            <small class="text-error" 
                   *ngIf="clienteForm.get('nombre')?.invalid && clienteForm.get('nombre')?.touched">
              El nombre es requerido
            </small>
          </div>

          <div class="form-group">
            <label class="form-label">Apellido *</label>
            <input type="text" 
                   class="form-control" 
                   formControlName="apellido" 
                   placeholder="Apellido del cliente">
            <small class="text-error" 
                   *ngIf="clienteForm.get('apellido')?.invalid && clienteForm.get('apellido')?.touched">
              El apellido es requerido
            </small>
          </div>

          <div class="form-group">
            <label class="form-label">DNI *</label>
            <input type="text" 
                   class="form-control" 
                   formControlName="dni" 
                   placeholder="DNI del cliente">
            <small class="text-error" 
                   *ngIf="clienteForm.get('dni')?.invalid && clienteForm.get('dni')?.touched">
              El DNI es requerido
            </small>
          </div>

          <div class="form-group">
            <label class="form-label">Teléfono</label>
            <input type="text" 
                   class="form-control" 
                   formControlName="telefono" 
                   placeholder="Teléfono de contacto">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Dirección</label>
          <input type="text" 
                 class="form-control" 
                 formControlName="direccion" 
                 placeholder="Dirección del cliente">
        </div>

        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" 
                 class="form-control" 
                 formControlName="email" 
                 placeholder="Email de contacto">
          <small class="text-error" 
                 *ngIf="clienteForm.get('email')?.invalid && clienteForm.get('email')?.touched">
            Ingrese un email válido
          </small>
        </div>

        <div class="d-flex justify-end gap-2 mt-4">
          <button class="btn btn-secondary" (click)="volver()">
            Cancelar
          </button>
          <button class="btn btn-success" 
                  [disabled]="clienteForm.invalid || loading"
                  (click)="onSubmit()">
            {{ loading ? 'Guardando...' : (isEditing ? 'Actualizar' : 'Crear') }}
          </button>
        </div>
      </form>
    </div>
  </div>

</div>
