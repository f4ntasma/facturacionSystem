<div class="container-fluid p-4">

  <!-- Selector de piso -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <select class="form-select w-auto">
      <option>Piso 1</option>
    </select>
  </div>

  <!-- Mesas -->
  <div class="row g-4">
    <div class="col-md-3" *ngFor="let mesa of mesas" (click)="verMesa(mesa)">
      <div class="card mesa-card shadow-sm">
        <div class="card-body text-center">
          <h6 class="fw-bold">{{ mesa.nombre }}</h6>

          <p *ngIf="mesa.total > 0" class="text-success fw-bold">
            S/{{ mesa.total }}.00
          </p>

          <p *ngIf="mesa.total === 0" class="text-muted">
            Libre
          </p>
        </div>
      </div>
    </div>

    <!-- Agregar mesa -->
    <div class="col-md-3">
      <div class="card mesa-card add shadow-sm" (click)="agregarMesa()">
        <div class="card-body d-flex justify-content-center align-items-center">
          <span class="fs-1">+</span>
        </div>
      </div>
    </div>
  </div>
</div>
