<div class="container mt-4">
<!-- Header -->
  <div>
      <h1 class="font-bold" style="font-size: 28px; color: var(--primary-blue);">Gestión de Mesas</h1>
      <p class="text-muted" style="font-size: 14px; margin-top: 1rem;">Gestión de mesas para tu restaurante</p>
    </div>
      
  <!-- SELECTOR DE PISO -->
  <div class="mb-4">
    <h4>Piso {{ pisoActual }}</h4>

    <button
      *ngFor="let piso of pisos"
      class="btn btn-outline-primary me-2"
      [class.active]="piso === pisoActual"
      (click)="irAPiso(piso)"
    >
      Piso {{ piso }}
    </button>
  </div>

  <div class="row g-4">

    <!-- MESAS -->
    <div class="col-md-3" *ngFor="let mesa of mesasFiltradas">
      <div class="mesa-card" (click)="abrirMesa(mesa)">

        <!-- OPCIONES -->
        <div class="dropdown mesa-options" (click)="$event.stopPropagation()">
          <button
            class="btn btn-light btn-sm rounded-circle"
            (click)="toggleDropdown(mesa.id)"
          >
            <i class="bi bi-three-dots-vertical"></i>
          </button>

          <ul class="dropdown-menu show" *ngIf="openDropdownId === mesa.id">
            <li>
              <a
                class="dropdown-item"
                data-bs-toggle="modal"
                data-bs-target="#modalEditarMesa"
                (click)="abrirEditarMesa(mesa)"
              >
                <i class="bi bi-pencil"></i> Editar
              </a>
            </li>
            <li>
              <a
                class="dropdown-item text-danger"
                (click)="eliminarMesa(mesa.id)"
              >
                <i class="bi bi-trash"></i> Eliminar
              </a>
            </li>
          </ul>
        </div>

        <h5>{{ mesa.nombre }}</h5>
        <small>Piso {{ mesa.piso }}</small>
      </div>
    </div>

    <!-- AGREGAR MESA -->
    <div class="col-md-3">
      <div class="add-mesa-card" (click)="agregarMesa()">
        <i class="bi bi-plus-circle"></i>
        <span>Agregar mesa</span>
      </div>
    </div>

  </div>
</div>

<!-- MODAL EDITAR -->
<div class="modal fade" id="modalEditarMesa" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Editar mesa</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">

        <div class="mb-3">
          <label class="form-label">Nombre</label>
          <input
            class="form-control"
            [(ngModel)]="formMesa.nombre"
          />
        </div>

        <div class="mb-3">
          <label class="form-label">Piso</label>
          <select
            class="form-select"
            [(ngModel)]="formMesa.piso"
          >
            <option *ngFor="let p of pisos" [ngValue]="p">
              Piso {{ p }}
            </option>
          </select>
        </div>

      </div>

      <div class="modal-footer">
        <button
          class="btn btn-light"
          data-bs-dismiss="modal"
        >
          Cancelar
        </button>

        <button
          class="btn btn-danger"
          data-bs-dismiss="modal"
          (click)="guardarCambiosMesa()"
        >
          Guardar
        </button>
      </div>

    </div>
  </div>
  </div>
