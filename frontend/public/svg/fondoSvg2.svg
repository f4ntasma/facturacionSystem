<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="100%" height="100%">
  <defs>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <style>
    .hud-line { stroke: #ffffff; stroke-width: 1.5; fill: none; opacity: 0.6; }
    .hud-dash { stroke: #ffffff; stroke-width: 1; stroke-dasharray: 4, 3; fill: none; opacity: 0.5; }
    .hud-fill { fill: url(#glowGrad); }
    .hud-glow { fill: #ffffff; opacity: 0.15; }
    .chip-line { stroke: #ffffff; stroke-width: 1.5; fill: none; opacity: 0.7; }
  </style>

  <g transform="translate(40, 260)">
    <ellipse cx="130" cy="220" rx="110" ry="40" class="hud-dash" />
    <ellipse cx="130" cy="220" rx="95" ry="32" class="hud-line" />
    <ellipse cx="130" cy="215" rx="80" ry="25" class="hud-glow" />
    
    <rect x="30" y="30" width="200" height="140" rx="8" fill="url(#lineGrad)" stroke="#ffffff" stroke-width="1.5" opacity="0.4" />
    <circle cx="45" cy="45" r="3" fill="#ffffff" opacity="0.7" />
    <circle cx="55" cy="45" r="3" fill="#ffffff" opacity="0.7" />
    <circle cx="65" cy="45" r="3" fill="#ffffff" opacity="0.7" />
    
    <path d="M 50 130 L 80 90 L 110 110 L 150 70" fill="none" stroke="#ffffff" stroke-width="2.5" opacity="0.9" />
    <rect x="50" y="140" width="15" height="10" class="hud-fill" />
    <rect x="75" y="120" width="15" height="30" class="hud-fill" />
    <rect x="100" y="135" width="15" height="15" class="hud-fill" />
    <rect x="125" y="105" width="15" height="45" class="hud-fill" />
    
    <line x1="160" y1="80" x2="210" y2="80" stroke="#ffffff" stroke-width="2" opacity="0.6" />
    <line x1="160" y1="90" x2="215" y2="90" stroke="#ffffff" stroke-width="2" opacity="0.6" />
    <line x1="160" y1="100" x2="195" y2="100" stroke="#ffffff" stroke-width="2" opacity="0.6" />
    <line x1="160" y1="110" x2="205" y2="110" stroke="#ffffff" stroke-width="2" opacity="0.6" />
  </g>

  <g transform="translate(280, 40)">
    <ellipse cx="150" cy="220" rx="90" ry="35" class="hud-dash" />
    <ellipse cx="150" cy="215" rx="105" ry="42" class="hud-line" />
    <path d="M 70 200 C 70 215, 230 215, 230 200 L 230 212 C 230 227, 70 227, 70 212 Z" class="hud-fill" opacity="0.3" />
    <ellipse cx="150" cy="200" rx="80" ry="28" fill="#ffffff" opacity="0.2" stroke="#ffffff" stroke-width="1" />

    <g transform="translate(30, 0)">
      <rect x="40" y="130" width="16" height="50" rx="2" class="hud-fill" />
      <rect x="65" y="100" width="16" height="80" rx="2" class="hud-fill" />
      <rect x="90" y="70" width="16" height="110" rx="2" class="hud-fill" />
      <rect x="115" y="40" width="16" height="140" rx="2" class="hud-fill" />
    </g>
  </g>

  <g transform="translate(340, 340)">
    <polygon points="110,90 170,60 230,90 170,120" fill="url(#lineGrad)" stroke="#ffffff" stroke-width="2" />
    <polygon points="120,90 170,65 220,90 170,115" fill="none" stroke="#ffffff" stroke-width="1" stroke-dasharray="3,2" />
    <polygon points="140,90 170,75 200,90 170,105" class="hud-fill" />

    <path d="M 110,80 L 70,60 L 40,60" class="chip-line" />
    <circle cx="40" cy="60" r="2.5" fill="#ffffff" />
    <path d="M 120,95 L 80,85 L 50,85" class="chip-line" />
    <circle cx="50" cy="85" r="2.5" fill="#ffffff" />
    <path d="M 130,110 L 90,115 L 60,115" class="chip-line" />
    <circle cx="60" cy="115" r="2.5" fill="#ffffff" />

    <path d="M 230,90 L 270,100 L 300,100" class="chip-line" />
    <circle cx="300" cy="100" r="2.5" fill="#ffffff" />
    <path d="M 220,75 L 260,55 L 290,55" class="chip-line" />
    <circle cx="290" cy="55" r="2.5" fill="#ffffff" />
    <path d="M 210,65 L 250,35 L 280,35" class="chip-line" />
    <circle cx="280" cy="35" r="2.5" fill="#ffffff" />
  </g>

  <g transform="translate(130, 140)">
    <rect x="0" y="0" width="100" height="60" rx="6" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.4" />
    <rect x="15" y="35" width="10" height="15" class="hud-fill" />
    <rect x="30" y="25" width="10" height="25" class="hud-fill" />
    <rect x="45" y="15" width="10" height="35" class="hud-fill" />
    <rect x="60" y="30" width="10" height="20" class="hud-fill" />
    <rect x="75" y="10" width="10" height="40" class="hud-fill" />
  </g>
</svg>
