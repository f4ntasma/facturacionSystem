<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%" opacity="0.15">
  <style>
    .node { fill: #ffffff; stroke: rgba(255,255,255,0.5); stroke-width: 2; }
    .line { stroke: rgba(255,255,255,0.2); stroke-width: 1; stroke-dasharray: 2,2; }
  </style>
  <line x1="100" y1="100" x2="250" y2="80" class="line" />
  <line x1="100" y1="100" x2="180" y2="250" class="line" />
  <line x1="250" y1="80" x2="350" y2="180" class="line" />
  <line x1="180" y1="250" x2="350" y2="180" class="line" />
  <line x1="180" y1="250" x2="280" y2="350" class="line" />
  <line x1="350" y1="180" x2="450" y2="120" class="line" />
  
  <circle cx="100" cy="100" r="4" class="node" />
  <circle cx="250" cy="80" r="3" class="node" />
  <circle cx="180" cy="250" r="5" class="node" />
  <circle cx="350" cy="180" r="4" class="node" />
  <circle cx="280" cy="350" r="3" class="node" />
  <circle cx="450" cy="120" r="4" class="node" />
</svg>
