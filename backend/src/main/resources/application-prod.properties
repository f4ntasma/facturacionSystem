# Configuración para producción (Dockploy MariaDB)
server.port=8080

# Configuración de MariaDB en Dockploy (host interno)
spring.datasource.url=jdbc:mariadb://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# Configuración JPA/Hibernate para MariaDB
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Configuración de CORS para producción
spring.web.cors.allowed-origins=http://localhost:4200,https://mantaro.com
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# JWT Configuration (Clave segura generada criptográficamente)
security.jwt.secret=${JWT_SECRET}
security.jwt.expiration=86400000

# Logging para producción
logging.level.com.facturacion=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN