# Configuración del servidor
server.port=8081

# ========================================
# BASE DE DATOS - MariaDB (Dockploy)
# ========================================
spring.datasource.url=jdbc:mariadb://31.97.29.13:6666/db-factullama
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.username=mantaro
spring.datasource.password=mantaro@2026

# Configuración JPA/Hibernate para MariaDB
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Deshabilitar H2 Console (no se usa, estamos con MariaDB)
spring.h2.console.enabled=false

# Configuración de CORS
spring.web.cors.allowed-origins=http://localhost:4200,http://localhost:3000
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

